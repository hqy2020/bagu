services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - bagu-redis-data:/data

  bagu:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "${PORT:-9000}:9000"
      - "${PORT2:-9001}:9001"
    volumes:
      - bagu-data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/1
      - SQLITE_PATH=/data/db.sqlite3

volumes:
  bagu-data:
  bagu-redis-data:
